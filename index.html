<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promethean</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #05050a; height: 100%; }
    #scene-canvas { position: fixed; inset: 0; z-index: 1; }
    #webcam-video { position: fixed; bottom: 16px; right: 16px; width: 220px; border-radius: 8px;
                     opacity: 0.6; transform: scaleX(-1); z-index: 2; pointer-events: none; }
    #debug-canvas { position: fixed; bottom: 16px; right: 16px; width: 220px; height: 165px;
                     border-radius: 8px; z-index: 3; pointer-events: none; }
    #hud { position: fixed; top: 16px; left: 16px; color: #d7d7ff; font-family: monospace;
           font-size: 12px; z-index: 3; pointer-events: none; }
    #gesture-debug { position: fixed; top: 16px; right: 16px; color: #6cf7ff; font-family: monospace;
                      font-size: 12px; z-index: 3; pointer-events: none; text-align: right;
                      background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px; }
    #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <canvas id="scene-canvas"></canvas>
  <video id="webcam-video" autoplay playsinline muted></video>
  <canvas id="debug-canvas" width="220" height="165"></canvas>
  <div id="hud"></div>
  <div id="gesture-debug">waiting for hand tracker…</div>
  <div id="flash-overlay"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
